[package]
name = "rust_dive"
version = "0.1.0"
edition = "2024"

[dependencies]
anyhow = "1"
env_logger = "0"
ra_ap_hir = "0"
ra_ap_ide = "0"
ra_ap_ide_db = "0"
ra_ap_load-cargo = "0"
ra_ap_project_model = "0"
ra_ap_syntax = "0"
ra_ap_vfs = "0"
time = { version = "0", features = ["formatting", "local-offset", "macros"] }
tracing = "0"
tracing-subscriber = { version = "0", features = ["env-filter"] }
tracing-tree = "0"
