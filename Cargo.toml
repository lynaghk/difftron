[package]
name = "rust_dive"
version = "0.1.0"
edition = "2024"

[dependencies]
anyhow = "1"
cargo_metadata = "0"
env_logger = "0"
ra_ap_syntax = "0"
time = { version = "0", features = ["formatting", "local-offset", "macros"] }
tracing = "0"
tracing-subscriber = { version = "0", features = ["env-filter"] }
tracing-tree = "0"
